---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/talosctl-cluster-action/main/schema/talos-cluster.json
# HA control plane: covers etcd quorum surviving a rolling reboot. Three VMs at
# the default 2GiB each is the practical ceiling on a 16GB runner.
# The ephemeral profile supplies the kernel args, kubelet GC, etcd, and audit
# settings, and pins the install image, so a leg is only what differs.
apiVersion: v1alpha1
kind: TalosCluster
metadata:
  name: e2e-3cp-0w
spec:
  qemu:
    talos-version: v1.13.6
  controlplanes:
    count: 3
  workers:
    count: 0
  config-patches:
    cluster: ["@patches/registry.yaml"]
